# KEDA ScaledObjects — auto-scale pods based on Kafka consumer group lag.
# Install KEDA first: https://keda.sh/docs/latest/deploy/
# kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.14.0/keda-2.14.0.yaml
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-gateway-scaler
  namespace: ai-backend
spec:
  scaleTargetRef:
    name: inference-gateway
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: inference-gateway
        topic: llm-requests
        lagThreshold: "5"      # scale up when backlog > 5 messages per replica
        offsetResetPolicy: latest
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: memory-service-scaler
  namespace: ai-backend
spec:
  scaleTargetRef:
    name: memory-service
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: memory-service-user
        topic: user-events
        lagThreshold: "10"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agent-orchestrator-scaler
  namespace: ai-backend
spec:
  scaleTargetRef:
    name: agent-orchestrator
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 120
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: agent-orchestrator-tasks
        topic: agent-tasks
        lagThreshold: "3"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: tool-runtime-scaler
  namespace: ai-backend
spec:
  scaleTargetRef:
    name: tool-runtime
  minReplicaCount: 1
  maxReplicaCount: 15
  cooldownPeriod: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: tool-runtime
        topic: tool-requests
        lagThreshold: "5"
---
# HPA for ws-gateway — scale on CPU (WebSocket connections are CPU-bound)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ws-gateway-hpa
  namespace: ai-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ws-gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
