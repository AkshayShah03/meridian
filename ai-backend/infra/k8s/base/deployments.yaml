# Shared env reference used by all Deployments
x-env: &common-env
  - name: KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      configMapKeyRef:
        name: ai-backend-config
        key: KAFKA_BOOTSTRAP_SERVERS
  - name: REDIS_URL
    valueFrom:
      configMapKeyRef:
        name: ai-backend-config
        key: REDIS_URL
  - name: DATABASE_URL
    valueFrom:
      configMapKeyRef:
        name: ai-backend-config
        key: DATABASE_URL
  - name: OLLAMA_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: ai-backend-config
        key: OLLAMA_BASE_URL
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    valueFrom:
      configMapKeyRef:
        name: ai-backend-config
        key: OTEL_EXPORTER_OTLP_ENDPOINT
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: ai-backend-secrets
        key: JWT_SECRET
  - name: ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-backend-secrets
        key: ANTHROPIC_API_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ai-backend:latest
          args: ["auth_service"]
          env: *common-env
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
  namespace: ai-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ws-gateway
  template:
    metadata:
      labels:
        app: ws-gateway
    spec:
      # sticky sessions: each pod handles its own WebSocket connections
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ws-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ws-gateway
          image: ai-backend:latest
          args: ["ws_gateway"]
          env: *common-env
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
